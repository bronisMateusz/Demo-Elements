name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: team
            VITE_DEPLOY_TARGET: team
            VITE_AGENTATION_ENABLED: "true"
          - target: client
            VITE_DEPLOY_TARGET: client
            VITE_AGENTATION_ENABLED: "false"
    name: build (${{ matrix.target }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build:vercel
        env:
          VITE_DEPLOY_TARGET: ${{ matrix.VITE_DEPLOY_TARGET }}
          VITE_AGENTATION_ENABLED: ${{ matrix.VITE_AGENTATION_ENABLED }}
